[phases.setup]
nixPkgs = ["nodejs_24"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = [
  "npm run build",
  "echo '--- public/assets contents ---'",
  "find public/assets -type f 2>/dev/null || echo 'public/assets is EMPTY or missing'",
  "echo '--- build/ contents ---'",
  "find build -type f 2>/dev/null | head -50",
  "echo '--- searching for manifest anywhere ---'",
  "find . -name 'manifest.json' -not -path '*/node_modules/*' 2>/dev/null || echo 'NO MANIFEST FOUND ANYWHERE'"
]
envs = ["NODE_ENV=production"]

[start]
cmd = "node ace migration:run --force && node build/bin/server.js"